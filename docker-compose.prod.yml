services:
  postgres:
    image: postgres:15
    container_name: eventhub_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventhub_password}
      POSTGRES_DB: ${POSTGRES_DB:-eventhub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventhub} -d ${POSTGRES_DB:-eventhub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-eventhub-backend:latest}
    container_name: eventhub_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventhub}:${POSTGRES_PASSWORD:-eventhub_password}@postgres:5432/${POSTGRES_DB:-eventhub}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm run migrate:deploy && npm run start:prod"

  frontend:
    image: ${FRONTEND_IMAGE:-eventhub-frontend:latest}
    container_name: eventhub_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: eventhub_nginx_prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    command: >
      /bin/sh -c 'cat <<'"'"'EOF'"'"' >/etc/nginx/conf.d/default.conf
      server {
          listen 80;
          server_name _;

          client_max_body_size 10m;

          location / {
              proxy_pass http://frontend:80;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location /api/ {
              proxy_pass http://backend:8000/api/;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location /api-docs/ {
              proxy_pass http://backend:8000/api-docs/;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }
      }
      EOF
      exec nginx -g "daemon off;"'

volumes:
  pgdata:
