name: CI GitHub Actions

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 3WA_DEV2_rendu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 3WA_DEV2_rendu/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm test -- --runInBand
